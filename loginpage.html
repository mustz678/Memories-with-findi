<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Romance Login</title>

    <!-- FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- MAIN -->

    <!-- FLOATING DECOR -->

<img src="assets/img/butterfly.png"
     class="floating butterfly-1">

<img src="assets/img/butterfly.png"
     class="floating butterfly-2">

<img src="assets/img/petals.png"
     class="floating petals-1">

<img src="assets/img/petals.png"
     class="floating petals-2">

    <div class="container">

        <div class="bubu-area">

    <!-- BUBBLE -->

    <div class="speech-bubble">

        Welcome back my baby, jangan lupa log in ya ♡

    </div>

    <!-- CHARACTER -->

    <img src="assets/img/bubu.png"
         alt="bubu"
         class="bubu">

</div>

        <!-- LOVE -->

        <div class="heart-container">

            <img src="assets/img/love.png"
                 alt="Love"
                 class="love-img">

            <button class="login-btn">
                LOGIN
            </button>

        </div>

    </div>

    <!-- POPUP -->

    <div class="popup">

  <div class="popup-box">

    <h2>Welcome ♡</h2>

    <input type="text"
           placeholder="Username"
           class="input-box username">

    <input type="password"
           placeholder="Password"
           class="input-box password">

    <button class="enter-btn">
        Enter
    </button>

    <p class="error-text"></p>

</div>

        </div>

    </div>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
